[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
norecursedirs = data logs conf .git __pycache__ .pytest_cache

# 默认排除集成测试（需要网络连接）
# 运行集成测试：pytest -m integration
# 运行全部测试：pytest -m ""
addopts = -m "not integration and not integration_test and not slow_integration_test"

markers =
    integration: marks tests as integration tests requiring network (deselect with '-m "not integration"')
    integration_test: marks tests as integration tests requiring network and INTEGRATION_TEST_ALLOW_LISTS env
    slow_integration_test: marks tests as slow integration tests (app tick level)
